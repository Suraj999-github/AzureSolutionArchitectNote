
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  .pres {
    font-family: var(--font-sans);
    padding: 0;
    min-height: 560px;
    position: relative;
  }

  .progress-bar {
    display: flex;
    gap: 4px;
    padding: 16px 20px 0;
    flex-wrap: wrap;
  }
  .pip {
    height: 3px;
    flex: 1;
    min-width: 12px;
    background: var(--color-border-tertiary);
    border-radius: 2px;
    transition: background 0.3s;
    cursor: pointer;
  }
  .pip.done { background: var(--color-text-info); }
  .pip.active { background: var(--color-text-primary); }

  .stage-label {
    font-size: 11px;
    color: var(--color-text-secondary);
    padding: 10px 20px 0;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .slide {
    display: none;
    padding: 16px 20px 20px;
    animation: fadeIn 0.35s ease;
  }
  .slide.active { display: block; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  .slide-title {
    font-size: 17px;
    font-weight: 500;
    color: var(--color-text-primary);
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .step-badge {
    font-size: 11px;
    font-weight: 500;
    background: var(--color-background-info);
    color: var(--color-text-info);
    padding: 2px 8px;
    border-radius: 99px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .slide-desc {
    font-size: 14px;
    color: var(--color-text-secondary);
    line-height: 1.6;
    margin-bottom: 16px;
    max-width: 560px;
  }

  .svg-area {
    width: 100%;
    overflow: visible;
  }

  .nav-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px 16px;
    border-top: 0.5px solid var(--color-border-tertiary);
  }
  .nav-row button {
    font-size: 13px;
    padding: 6px 16px;
    cursor: pointer;
  }
  .nav-row button:disabled {
    opacity: 0.35;
    cursor: default;
  }
  .counter {
    font-size: 12px;
    color: var(--color-text-secondary);
  }

  .legend {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    padding: 0 20px 12px;
  }
  .leg-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: var(--color-text-secondary);
  }
  .leg-dot {
    width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0;
  }
</style>

<div class="pres">
  <h2 class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)">International remittance flow — animated step-by-step presentation</h2>

  <div class="progress-bar" id="pips"></div>
  <div class="stage-label" id="stage-lbl"></div>

  <div id="slides"></div>

  <div class="legend">
    <div class="leg-item"><div class="leg-dot" style="background:#3B8BD4"></div>Sender side</div>
    <div class="leg-item"><div class="leg-dot" style="background:#1D9E75"></div>Compliance</div>
    <div class="leg-item"><div class="leg-dot" style="background:#BA7517"></div>Processing</div>
    <div class="leg-item"><div class="leg-dot" style="background:#639922"></div>Payout / success</div>
    <div class="leg-item"><div class="leg-dot" style="background:#A32D2D"></div>Failure path</div>
    <div class="leg-item"><div class="leg-dot" style="background:#888780"></div>System</div>
  </div>

  <div class="nav-row">
    <button id="prev-btn" onclick="go(-1)">← Back</button>
    <span class="counter" id="counter"></span>
    <button id="next-btn" onclick="go(1)">Next →</button>
  </div>
</div>

      { id:"clear",  x:510, y:40,  w:120, h:44, color:"green", label:"No alert",      sub:"Cleared" },
      { id:"sar",    x:510, y:110, w:120, h:44, color:"red",   label:"SAR review",    sub:"Compliance team" },
    ],
    arrows: [
      { from:"paid", to:"aml",   side:"right" },
      { from:"aml",  to:"clear", side:"fork-top" },
      { from:"aml",  to:"sar",   side:"fork-bot" },
    ],
    highlight: ["aml"]
  },
  {
    stage: "Phase 6 · Confirmation & Settlement",
    title: "Settlement & Nostro reconciliation",
    badge: "Step 20",
    desc: "At end-of-day, the partner generates a settlement file listing all paid transactions. The PSP reconciles it against its internal records. Unmatched items (breaks) are resolved within 24–48 h. If the Nostro balance falls below the minimum threshold, a replenishment wire is initiated.",
    nodes: [
      { id:"eod",    x:40,  y:80,  w:130, h:44, color:"amber", label:"EOD cut-off",   sub:"Partner file" },
      { id:"recon",  x:260, y:80,  w:160, h:44, color:"amber", label:"Reconciliation",sub:"File vs DB match" },
      { id:"match",  x:510, y:40,  w:120, h:44, color:"green", label:"Matched",       sub:"Books closed" },
      { id:"break",  x:510, y:120, w:120, h:44, color:"red",   label:"Break",         sub:"24–48 h resolve" },
      { id:"nostro", x:260, y:180, w:160, h:44, color:"amber", label:"Nostro monitor",sub:"Replenish if low" },
    ],
    arrows: [
      { from:"eod",    to:"recon",  side:"right" },
      { from:"recon",  to:"match",  side:"fork-top" },
      { from:"recon",  to:"break",  side:"fork-bot" },
      { from:"recon",  to:"nostro", side:"down" },
    ],
    highlight: ["recon","nostro"]
  },
];

const colorMap = {
  blue:  { fill:"#E6F1FB", stroke:"#185FA5", text:"#0C447C" },
  teal:  { fill:"#E1F5EE", stroke:"#0F6E56", text:"#085041" },
  amber: { fill:"#FAEEDA", stroke:"#854F0B", text:"#633806" },
  green: { fill:"#EAF3DE", stroke:"#3B6D11", text:"#27500A" },
  red:   { fill:"#FCEBEB", stroke:"#A32D2D", text:"#791F1F" },
  gray:  { fill:"#F1EFE8", stroke:"#5F5E5A", text:"#444441" },
};

function buildSVG(step) {
  const { nodes, arrows, highlight } = step;
  const nodeMap = {};
  nodes.forEach(n => nodeMap[n.id] = n);

  const SVG_H = 260;

  let svg = `<svg class="svg-area" viewBox="0 0 640 ${SVG_H}" role="img">
  <title>${step.title}</title>
  <defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>`;

  arrows.forEach(arr => {
    const a = nodeMap[arr.from], b = nodeMap[arr.to];
    if (!a || !b) return;
    const ax = a.x + a.w, ay = a.y + a.h / 2;
    const bx = b.x, by = b.y + b.h / 2;
    let d = "";
    const side = arr.side || "right";
    if (side === "right") {
      d = `M${ax} ${ay} L${bx} ${by}`;
    } else if (side === "fork-top") {
      d = `M${ax} ${ay} L${bx} ${by}`;
    } else if (side === "fork-mid") {
      d = `M${ax} ${ay} L${bx} ${by}`;
    } else if (side === "fork-bot") {
      d = `M${ax} ${ay} L${bx} ${by}`;
    } else if (side === "down") {
      const sx = a.x + a.w / 2, sy = a.y + a.h;
      const ex = b.x + b.w / 2, ey = b.y;
      d = `M${sx} ${sy} L${ex} ${ey}`;
    } else if (side === "down-left") {
      const sx = a.x + a.w / 2, sy = a.y + a.h;
      const ex = b.x + b.w / 2, ey = b.y;
      d = `M${sx} ${sy} Q${sx} ${ey} ${ex} ${ey}`;
    }
    svg += `<path d="${d}" fill="none" stroke="var(--color-border-secondary)" stroke-width="1.2" marker-end="url(#ah)"/>`;
  });

  nodes.forEach(n => {
    const c = colorMap[n.color] || colorMap.gray;
    const isHL = highlight && highlight.includes(n.id);
    const fillC = isHL ? c.fill : "var(--color-background-secondary)";
    const strokeC = isHL ? c.stroke : "var(--color-border-secondary)";
    const textC = isHL ? c.text : "var(--color-text-secondary)";
    const subC = isHL ? c.stroke : "var(--color-text-secondary)";
    const sw = isHL ? "1.5" : "0.5";
    const rx = 8;
    const cx = n.x + n.w / 2;
    const cy1 = n.y + (n.sub ? n.h * 0.35 : n.h / 2);
    const cy2 = n.y + n.h * 0.68;

    svg += `<g>
      <rect x="${n.x}" y="${n.y}" width="${n.w}" height="${n.h}" rx="${rx}" fill="${fillC}" stroke="${strokeC}" stroke-width="${sw}"/>
      <text x="${cx}" y="${cy1}" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="${textC}" font-family="var(--font-sans)">${n.label}</text>`;
    if (n.sub) {
      svg += `<text x="${cx}" y="${cy2}" text-anchor="middle" dominant-baseline="central" font-size="11" fill="${subC}" font-family="var(--font-sans)" opacity="0.8">${n.sub}</text>`;
    }
    svg += `</g>`;
  });

  svg += `</svg>`;
  return svg;
}

let cur = 0;

function render() {
  const pips = document.getElementById('pips');
  pips.innerHTML = '';
  STEPS.forEach((_, i) => {
    const p = document.createElement('div');
    p.className = 'pip' + (i < cur ? ' done' : i === cur ? ' active' : '');
    p.onclick = () => { cur = i; render(); };
    pips.appendChild(p);
  });

  document.getElementById('stage-lbl').textContent = STEPS[cur].stage;
  document.getElementById('counter').textContent = `${cur + 1} of ${STEPS.length}`;
  document.getElementById('prev-btn').disabled = cur === 0;
  document.getElementById('next-btn').disabled = cur === STEPS.length - 1;

  const slides = document.getElementById('slides');
  slides.innerHTML = '';
  const s = STEPS[cur];
  const div = document.createElement('div');
  div.className = 'slide active';
  div.innerHTML = `
    <div class="slide-title">
      <span class="step-badge">${s.badge}</span>
      ${s.title}
    </div>
    <p class="slide-desc">${s.desc}</p>
    ${buildSVG(s)}
  `;
  slides.appendChild(div);
}

function go(dir) {
  const next = cur + dir;
  if (next < 0 || next >= STEPS.length) return;
  cur = next;
  render();
}

render();
</script>
